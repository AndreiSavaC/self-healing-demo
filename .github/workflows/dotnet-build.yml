name: Build .NET

on:
  push:
    branches: [ main, 'fix/**' ]
    paths:
      - 'src/DemoApp/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/DemoApp/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore src/DemoApp/DemoApp.csproj

    - name: Build
      run: dotnet build src/DemoApp/DemoApp.csproj --configuration Release --no-restore

    - name: Run tests
      run: dotnet test src/DemoApp/DemoApp.csproj --configuration Release --no-build --verbosity normal
