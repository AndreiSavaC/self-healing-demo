name: CI Pipeline

on:
  push:
    branches: [ main, 'fix/**', 'feature/**' ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1: Lint ──────────────────────────────────────────────────
  lint:
    name: "Lint & Format Check"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install lint tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy

    - name: Check formatting (black)
      run: black --check --diff src/python/ tests/

    - name: Check import order (isort)
      run: isort --check-only --diff src/python/ tests/

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 src/python/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Treat warnings as errors with a complexity threshold
        flake8 src/python/ tests/ --count --max-complexity=10 --max-line-length=120 --statistics

    - name: Type check with mypy
      run: mypy src/python/ --ignore-missing-imports --no-error-summary || true

  # ── Stage 2: Build ─────────────────────────────────────────────────
  build-python:
    name: "Build Python Package"
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify imports
      run: |
        python -c "from src.python.calculator import Calculator; print('Calculator OK')"
        python -c "from src.python.validators import InputValidator; print('Validator OK')"
        python -c "from src.python.statistics import Statistics; print('Statistics OK')"
        python -c "from src.python.converter import UnitConverter; print('Converter OK')"

  build-dotnet:
    name: "Build .NET"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore src/DemoApp/DemoApp.csproj

    - name: Build
      run: dotnet build src/DemoApp/DemoApp.csproj --configuration Release --no-restore --warnaserror

  # ── Stage 3: Test Matrix ───────────────────────────────────────────
  test-python:
    name: "Python Tests (Py ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: [build-python]
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --tb=long \
          --cov=src/python \
          --cov-report=term-missing \
          --cov-report=xml:coverage.xml \
          --cov-fail-under=80 \
          --junitxml=test-results.xml

    - name: Upload coverage
      if: matrix.python-version == '3.12'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-py${{ matrix.python-version }}
        path: test-results.xml

  test-dotnet:
    name: "DotNet Tests"
    runs-on: ubuntu-latest
    needs: [build-dotnet]
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Test
      run: dotnet test src/DemoApp/DemoApp.csproj --configuration Release --verbosity normal

  # ── Stage 4: Security & Quality ────────────────────────────────────
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: [test-python]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install safety
      run: pip install safety pip-audit

    - name: Check dependencies for vulnerabilities
      run: pip-audit -r requirements.txt
      continue-on-error: true

    - name: Check for hardcoded secrets
      run: |
        # Simple grep-based secret scan
        if grep -rn "password\s*=\s*['\"]" src/ tests/ --include="*.py" --include="*.cs" | grep -v "test_\|#\|//\|placeholder"; then
          echo "::error::Potential hardcoded secrets found!"
          exit 1
        fi
        echo "No hardcoded secrets detected."

  # ── Stage 5: Docker ────────────────────────────────────────────────
  docker:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: [test-python, test-dotnet]
    steps:
    - uses: actions/checkout@v4

    - name: Build Python Docker image
      run: |
        docker build -f docker/Dockerfile.python -t demo-app-python:${{ github.sha }} .

    - name: Build .NET Docker image
      run: |
        docker build -f docker/Dockerfile.dotnet -t demo-app-dotnet:${{ github.sha }} .

    - name: Smoke test Python container
      run: |
        docker run --rm demo-app-python:${{ github.sha }} python -c "
        from src.python.calculator import Calculator
        c = Calculator()
        assert c.add(2, 3) == 5
        print('Smoke test passed')
        "

  # ── Final: Summary ─────────────────────────────────────────────────
  ci-complete:
    name: "CI Complete"
    runs-on: ubuntu-latest
    needs: [test-python, test-dotnet, security, docker]
    if: always()
    steps:
    - name: Check results
      run: |
        if [[ "${{ needs.test-python.result }}" == "failure" ]] || \
           [[ "${{ needs.test-dotnet.result }}" == "failure" ]]; then
          echo "::error::Tests failed!"
          exit 1
        fi
        echo "✅ All CI checks passed!"
