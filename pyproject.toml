[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.black]
line-length = 120
target-version = ["py310", "py311", "py312"]

[tool.isort]
profile = "black"
line_length = 120

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true

[tool.coverage.run]
source = ["src/python"]
omit = ["tests/*"]

[tool.coverage.report]
fail_under = 80
show_missing = true
